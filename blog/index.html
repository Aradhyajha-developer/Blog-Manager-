<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Blog Manager</title>

</head>

<body>

  <div class="container">

    <!-- ================= Header ================= -->

    <header class="header">

      <h1>📝 Blog Manager</h1>

      <button id="themeBtn">
        🌙 Dark Mode
      </button>

    </header>



    <!-- ================= Statistics ================= -->

    <section class="stats">

      <div class="stat-card">

        <h2 id="totalBlogs">0</h2>

        <p>Total Blogs</p>

      </div>

      <div class="stat-card">

        <h2 id="favoriteBlogs">0</h2>

        <p>Favorites</p>

      </div>

    </section>



    <!-- ================= Search ================= -->

    <input

      type="text"

      id="searchInput"

      placeholder="🔍 Search Blog..."

    >



    <!-- ================= Filter & Sort ================= -->

    <div class="toolbar">

      <select id="categoryFilter">

        <option value="All">
          All Categories
        </option>

        <option value="Technology">
          Technology
        </option>

        <option value="Programming">
          Programming
        </option>

        <option value="Education">
          Education
        </option>

        <option value="Travel">
          Travel
        </option>

        <option value="Personal">
          Personal
        </option>

      </select>



      <select id="sortBlogs">

        <option value="new">
          Newest First
        </option>

        <option value="old">
          Oldest First
        </option>

      </select>

    </div>



    <!-- ================= Form ================= -->

    <form id="blog-form">

      <input

        type="text"

        id="title"

        placeholder="Enter Blog Title"

        required

      >



      <select id="category">

        <option value="Technology">
          Technology
        </option>

        <option value="Programming">
          Programming
        </option>

        <option value="Education">
          Education
        </option>

        <option value="Travel">
          Travel
        </option>

        <option value="Personal">
          Personal
        </option>

      </select>



      <textarea

        id="body"

        maxlength="500"

        placeholder="Write your blog..."

        required

      ></textarea>



      <small>

        <span id="charCount">
          0
        </span>/500 Characters

      </small>



      <button

        type="submit"

        id="submitBtn"

      >

        Add Blog

      </button>

    </form>



    <!-- ================= Action Buttons ================= -->

    <div class="actions">

      <button id="clearAll">

        🗑 Clear All

      </button>



      <button id="exportBtn">

        📤 Export

      </button>

    </div>



    <!-- ================= Blog List ================= -->

    <ul id="blog-list"></ul>



    <!-- ================= Empty State ================= -->

    <div

      id="emptyState"

      class="empty"

    >

      <h2>

        📄 No Blogs Found

      </h2>

      <p>

        Create your first blog.

      </p>

    </div>



  </div>



  <!-- Toast -->

  <div id="toast"></div>



  <script

    type="module"

    src="/src/main.js"

  ></script>

</body>

</html>
