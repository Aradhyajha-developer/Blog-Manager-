<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Blog Manager</title>

</head>

<body>

<div class="app">

<!-- ========================= -->
<!-- HEADER -->
<!-- ========================= -->

<header>

<div class="logo">

<h1>📝 Blog <span>Manager</span></h1>

</div>


<button id="themeBtn">

🌙 Dark Mode

</button>

</header>



<!-- ========================= -->
<!-- MAIN -->
<!-- ========================= -->

<div class="dashboard">


<!-- ========================= -->
<!-- LEFT PANEL -->
<!-- ========================= -->

<aside class="sidebar">


<!-- Statistics -->

<div class="stats">

<div class="stat-card">

<div class="icon">

📄

</div>

<h2 id="totalBlogs">

0

</h2>

<p>

Total Blogs

</p>

</div>



<div class="stat-card">

<div class="icon">

❤️

</div>

<h2 id="favoriteBlogs">

0

</h2>

<p>

Favorites

</p>

</div>


</div>



<!-- Search -->

<input

type="text"

id="search"

placeholder="🔍 Search Blogs..."

>



<!-- Filter -->

<div class="filters">

<select id="categoryFilter">

<option>All Categories</option>

<option>Technology</option>

<option>Programming</option>

<option>Travel</option>

<option>Education</option>

<option>Personal</option>

</select>


<select id="sortBlogs">

<option value="new">

Newest First

</option>

<option value="old">

Oldest First

</option>

</select>


</div>




<!-- Form -->

<div class="form-box">

<h2>

✍ Create New Blog

</h2>



<form id="blogForm">


<input

type="text"

id="title"

placeholder="Enter Blog Title"

required

>



<select id="category">

<option>

Technology

</option>

<option>

Programming

</option>

<option>

Travel

</option>

<option>

Education

</option>

<option>

Personal

</option>

</select>



<textarea

id="body"

maxlength="500"

placeholder="Write your blog..."

required

></textarea>



<p>

<span id="charCount">

0

</span>

/500 Characters

</p>



<button

type="submit"

id="submitBtn">

Add Blog

</button>



</form>



<div class="bottom-buttons">

<button id="clearAll">

🗑 Clear All

</button>

<button id="exportBtn">

📤 Export JSON

</button>

</div>


</div>


</aside>




<!-- ========================= -->
<!-- RIGHT PANEL -->
<!-- ========================= -->

<section class="content">

<h2>

📚 All Blogs

</h2>


<ul id="blog-list">

</ul>



<div id="emptyState">

<h2>

📄 No Blogs Found

</h2>

<p>

Create your first blog.

</p>

</div>



</section>


</div>



</div>




<div id="toast">

Success

</div>



<script
type="module"
src="/src/main.js">

</script>

</body>

</html>
